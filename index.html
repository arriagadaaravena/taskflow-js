<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow - Gestión de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>TaskFlow 📝</h1>
    <p>Gestor de tareas</p>
  </header>

  <main>
    <!-- Formulario para agregar nuevas tareas -->
    <form id="form-tarea">
      <input
        type="text"
        id="input-descripcion"
        placeholder="Escribe una nueva tarea..."
        autocomplete="off"
      >
      <input
        type="number"
        id="input-minutos"
        placeholder="Minutos límite (opcional)"
        min="1"
      >
      <button type="submit" id="btn-agregar" disabled>Agregar</button>
    </form>

    <!-- Aquí se muestran las notificaciones (Paso 4: asincronía) -->
    <div id="notificacion"></div>

    <!-- Botón para traer tareas de ejemplo desde una API externa (Paso 5) -->
    <button id="btn-cargar-api">Cargar tareas desde la API</button>

    <!-- Resumen de tareas (total / pendientes / completadas) -->
    <div id="resumen-tareas"></div>

    <!-- Lista de tareas, se llena dinámicamente desde app.js -->
    <ul id="lista-tareas"></ul>
  </main>

  <!-- type="module" es obligatorio para poder usar import/export -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
